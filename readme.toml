[[sections.items]]
content = "- **过程控制系统与仪表**（王再英 / 刘淮霞 / 彭倩 / 机械工业出版社 / 第 2 版 / textbook）"

[[sections]]
title = "关于考试"

[[sections.items]]
content = """
考试难度：低，每年没听说有挂科的

考试难度很简单，考试内容基本是老师上课强调了要掌握的重点，因此只需要考前速通一下回放有个印象即可。考题的顺序基本按照上课教的章节顺序排列，所以考试时可以自己把握做题顺序。

考试的基本套路可以参考 exams 文件夹下往年的题目，需要大背诵的内容不多，根据考试重点稍微背一些即可；由于大家都是上过自控的，这门课需要理解的内容也不多。由于考试分数的占比不高，甚至可以完全忽略难度较大的后面两章（Smith 和解耦控制）都能及格。
"""
author = { name = "psp_dada", link = "https://github.com/pspdada", date = "2025-05" }

[[sections]]
title = "课程建议"

[[sections.items]]
content = "性价比极高，必选。22 级这门课的学时少了很多，导致内容也少了很多，因此速通更方便了。不过仓库里 23 年的笔记和资料依然适用。"
